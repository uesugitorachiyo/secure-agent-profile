<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Secure Agent Profile workflow</title>
  <desc id="desc">A secure coding brief moves through intake, risk classification, guarded planning, isolated implementation, security review, and signed evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151a22"/>
      <stop offset="1" stop-color="#27313d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#9ee493"/>
    </marker>
    <style>
      .h{font:700 38px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fbff}
      .p{font:500 19px system-ui,-apple-system,Segoe UI,sans-serif;fill:#c2d2df}
      .box{fill:#fff;stroke:#d8e0e8;stroke-width:2}
      .safe{fill:#effbea;stroke:#9ee493;stroke-width:2}
      .gate{fill:#fff6e8;stroke:#f1b35f;stroke-width:2}
      .t{font:700 20px system-ui,-apple-system,Segoe UI,sans-serif;fill:#17212b}
      .s{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#536577}
      .line{stroke:#9ee493;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="54" y="70" class="h">Secure Agent Profile</text>
  <text x="54" y="104" class="p">Guarded coding-agent work with policy gates and evidence instead of a free-form transcript.</text>

  <rect x="54" y="172" width="176" height="122" rx="12" class="box"/>
  <text x="82" y="220" class="t">Brief</text>
  <text x="82" y="252" class="s">bounded task</text>
  <path class="line" d="M238 233 H300"/>

  <rect x="318" y="172" width="176" height="122" rx="12" class="gate"/>
  <text x="344" y="220" class="t">Risk Gate</text>
  <text x="344" y="252" class="s">classify actions</text>
  <path class="line" d="M502 233 H564"/>

  <rect x="582" y="172" width="176" height="122" rx="12" class="safe"/>
  <text x="608" y="220" class="t">Workspace</text>
  <text x="608" y="252" class="s">copy, patch, verify</text>
  <path class="line" d="M766 233 H828"/>

  <rect x="846" y="172" width="176" height="122" rx="12" class="gate"/>
  <text x="872" y="220" class="t">Review</text>
  <text x="872" y="252" class="s">security + policy</text>
  <path class="line" d="M1030 233 H1074"/>

  <rect x="1084" y="172" width="80" height="122" rx="12" class="box"/>
  <text x="1106" y="220" class="t">Pack</text>
  <text x="1104" y="252" class="s">sign</text>

  <rect x="170" y="380" width="860" height="58" rx="29" fill="#1d2731" stroke="#45596d"/>
  <text x="214" y="416" class="p">Default boundary: no direct source mutation, deploys, secret reads, or remote git writes.</text>
</svg>
